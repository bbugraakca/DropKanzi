services:
  caddy:
    image: caddy:2.8
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pricehawk}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
    expose:
      - "5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - /data/redis:/data

  scraper:
    build:
      context: ../scraper
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      REDIS_URL: ${REDIS_URL}
      FORCE_PROXY: ${FORCE_PROXY:-true}
    expose:
      - "8001"
    mem_limit: 4g

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      PORT: 3001
      SCRAPER_URL: http://scraper:8001
      # DATABASE_URL + REDIS_URL come from env_file — do not set ${DATABASE_URL} here
      # (host substitution can be empty and override env_file → crash loop).
    expose:
      - "3001"
    depends_on:
      - postgres
      - redis
      - scraper

  worker-pf:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    command: ["node", "dist/workers/pfScanWorker.js"]
    environment:
      SCRAPER_URL: http://scraper:8001
      PF_SCAN_BUDGET_USD: ${PF_SCAN_BUDGET_USD:-2}
    depends_on:
      - backend

  worker-pf-reprice:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    command: ["node", "dist/workers/pfRepriceWorker.js"]
    environment:
      SCRAPER_URL: http://scraper:8001
    depends_on:
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:3001/api
    restart: always
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_INTERNAL_URL: http://backend:3001/api
    expose:
      - "3000"
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
